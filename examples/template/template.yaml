apiVersion: scaffolder.backstage.io/v1beta3
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-template
kind: Template
metadata:
  name: example-nodejs-template
  title: Example Node.js Template
  description: An example template for the scaffolder that creates a simple Node.js service
spec:
  owner: user:guest
  type: service

  # These parameters are used to generate the input form in the frontend, and are
  # used to gather input data for the execution of the template.
  parameters:
    - title: Service Details
      required:
        - name
        - short_description
        - urgency
      properties:
        name:
          title: Service Name
          type: string
          description: Unique name of the component
          ui:autofocus: true
          ui:options:
            rows: 5
        short_description:
          title: ServiceNow Incident Summary
          type: string
          description: Brief summary of what this service does (will create a ServiceNow incident)
        urgency:
          title: Urgency
          type: string
          enum: ['1', '2', '3']
          enumNames: ['High', 'Medium', 'Low']
          default: '2'
        description:
          title: Incident Description
          type: string
          description: Detailed description of the service (optional)
          ui:widget: textarea
        category:
          title: Category
          type: string
          enum: ['software', 'hardware', 'network', 'database', 'inquiry']
          default: 'software'
    - title: Choose a location
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  # These steps are executed in the scaffolder backend, using data that we gathered
  # via the parameters above.
  steps:
    # Each step executes an action, in this case one templates files into the working directory.
    - id: fetch-base
      name: Fetch Base
      action: fetch:template
      input:
        url: ./content
        values:
          name: "${{ parameters.name }}"

    # This step publishes the contents of the working directory to GitHub.
    # If you or your organization prefer another default branch name over 'main'
    # you can change that here.
    - id: publish
      name: Publish
      action: publish:github
      input:
        description: "This is ${{ parameters.name }}"
        repoUrl: "${{ parameters.repoUrl }}"
        defaultBranch: 'main'

    # The final step is to register our new component in the catalog.
    - id: register
      name: Register
      action: catalog:register
      input:
        repoContentsUrl: "${{ steps['publish'].output.repoContentsUrl }}"
        catalogInfoPath: '/catalog-info.yaml'

    # NEW: Create a ServiceNow incident for this new service
    - id: create-servicenow-incident
      name: Create ServiceNow Incident
      action: servicenow:now:table:createRecord
      input:
        tableName: incident
        requestBody:
          short_description: "${{ parameters.short_description }}"
          description: "${{ parameters.description || 'New service created: ' + parameters.name }}"
          urgency: "${{ parameters.urgency }}"
          impact: '2'
          category: "${{ parameters.category }}"
          contact_type: 'self-service'
          u_backstage_entity_id: "${{ steps['register'].output.entityRef }}"
        sysparmFields:
          - number
          - sys_id
          - short_description
          - state

    # Let's notify the user that the template has completed using the Notification action
    - id: notify
      name: Notify
      action: notification:send
      input:
        recipients: entity
        entityRefs:
          - user:default/guest
        title: 'Template executed'
        info: 'Your template has been executed and a ServiceNow incident has been created: ${{ steps["create-servicenow-incident"].output.number }}'
        severity: 'normal'

  # Outputs are displayed to the user after a successful execution of the template.
  output:
    links:
      - title: Repository
        url: "${{ steps['publish'].output.remoteUrl }}"
      - title: Open in catalog
        icon: catalog
        entityRef: "${{ steps['register'].output.entityRef }}"
      - title: ServiceNow Incident
        url: "https://dev406616.service-now.com/nav_to.do?uri=incident.do?sys_id=${{ steps['create-servicenow-incident'].output.sys_id }}"